{% extends 'base.html' %}

{% block content %}
<style>
.role-card {
    border: 0;
    border-radius: 24px;
    transition: transform .2s ease, box-shadow .2s ease;
    min-height: 100%;
    display: flex;
    flex-direction: column;
}
.role-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 1.25rem 2.5rem rgba(0,0,0,.12) !important;
}
.role-card .card-body {
    display: flex;
    flex-direction: column;
    flex: 1;
}
.role-card .role-icon {
    font-size: 3rem;
    line-height: 1;
}
</style>

<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="fw-bold">Choose Registration Role</h1>
        <p class="text-muted mb-0">Select the account type you want to create.</p>
    </div>

    <div class="row g-4 justify-content-center">
        {% for role in roles %}
            <div class="col-md-4 col-lg-3">
                <a href="{{ role.resolved_register_url }}" class="text-decoration-none">
                    <div class="card role-card shadow-sm text-center p-4 h-100">
                        <div class="card-body">
                            <div class="role-icon mb-3">{{ role.icon }}</div>
                            <h4>{{ role.name }}</h4>
                            <p class="text-muted mb-4">{{ role.description }}</p>
                            <span class="btn btn-success w-100 mt-auto">Continue</span>
                        </div>
                    </div>
                </a>
            </div>
        {% empty %}
            <div class="col-lg-6">
                <div class="alert alert-warning text-center mb-0">
                    No registration roles are available right now.
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
