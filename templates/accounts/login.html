{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0 login-card">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="mb-3 display-6">🔐</div>
                        <h1 class="h3 mb-2 fw-bold">Sign in to your account</h1>
                        <p class="text-muted mb-0">Enter your email and password. We will detect your account type automatically.</p>
                    </div>

                    {% if error %}
                        <div class="alert alert-danger">
                            {{ error }}
                        </div>
                    {% endif %}

                    <form method="POST" class="login-form">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Email</label>
                            {{ form.email }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            <div class="password-field-group password-field-wrapper">
                                {{ form.password }}
                                <button type="button" class="password-toggle-btn" onclick="togglePassword()" aria-label="Toggle password visibility" aria-pressed="false">
                                    <i class="bi bi-eye-fill password-toggle"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-success btn-lg w-100 login-submit">Login</button>
                    </form>

                    <hr class="my-4">

                    <p class="text-center mb-0">
                        Need an account? <a href="{% url 'register' %}">Register here</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.login-card {
    border-radius: 24px;
}
.login-submit {
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(25, 135, 84, .18);
}
</style>
<script>

function togglePassword() {

    const passwordField =
        document.getElementById("id_password");

    const eyeIcon =
        document.querySelector(".password-toggle");

    const toggleButton =
        document.querySelector(".password-toggle-btn");

    if (passwordField.type === "password") {

        passwordField.type = "text";

        eyeIcon.classList.remove(
            "bi-eye-fill"
        );

        eyeIcon.classList.add(
            "bi-eye-slash-fill"
        );

        toggleButton.setAttribute('aria-label', 'Hide password');
        toggleButton.setAttribute('aria-pressed', 'true');

    }

    else {

        passwordField.type = "password";

        eyeIcon.classList.remove(
            "bi-eye-slash-fill"
        );

        eyeIcon.classList.add(
            "bi-eye-fill"
        );

        toggleButton.setAttribute('aria-label', 'Show password');
        toggleButton.setAttribute('aria-pressed', 'false');

    }

}

</script>

{% endblock %}
