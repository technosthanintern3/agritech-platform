{% extends 'dashboard/base_admin.html' %}

{% block content %}

<div class="container">

<div class="card shadow border-0">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">
✏️ Edit Product
</h3>

</div>

<div class="card-body">

<form
method="POST"
enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button
type="submit"
class="btn btn-primary">

Update Product

</button>

<a
href="{% url 'products_list' %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

{% endblock %}
