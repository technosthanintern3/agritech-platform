{% extends 'dashboard/base_admin.html' %}

{% block content %}

<div class="d-flex justify-content-between mb-3">

<h3>Why Choose Us Cards</h3>

<a
href="{% url 'add_why_choose' %}"
class="btn btn-success">

+ Add Card

</a>

</div>

<div class="card shadow">

<div class="card-body">

<table class="table">

<thead>

<tr>

<th>ID</th>
<th>Icon</th>
<th>Title</th>

</tr>

</thead>

<tbody>

{% for item in items %}

<tr>

<td>{{ item.id }}</td>

<td>{{ item.icon }}</td>

<td>{{ item.title }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
