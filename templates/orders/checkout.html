{% extends 'base.html' %}

{% block content %}
<div class="checkout-page">
    <div class="container py-4 py-lg-5">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="checkout-card">
                    <div class="checkout-summary">
                        <span>Secure Checkout</span>
                        <h1>Place Your Order</h1>
                        <p>Confirm delivery details for your farm input order.</p>
                        <div class="total-box">
                            <small>Total Amount</small>
                            <strong>Rs {{ total }}</strong>
                        </div>
                    </div>
                    <div class="checkout-form">
                        {% if form.errors %}
                            <div class="alert alert-danger">Please correct the highlighted fields.</div>
                        {% endif %}
                        <form method="POST" class="styled-form">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-success btn-lg">Place Order</button>
                            <a href="{% url 'cart' %}" class="btn btn-outline-secondary btn-lg ms-sm-2 mt-2 mt-sm-0">Back to Cart</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.checkout-page {
    background:
        radial-gradient(circle at top right, rgba(25, 135, 84, .07), transparent 28rem),
        #f6f8f3;
    min-height: calc(100vh - 76px);
}
.checkout-card {
    display: grid;
    grid-template-columns: 300px minmax(0, 1fr);
    background: #fff;
    border: 1px solid rgba(15, 61, 46, .1);
    border-radius: 8px;
    box-shadow: 0 18px 45px rgba(15, 61, 46, .12);
    overflow: hidden;
}
.checkout-summary {
    background: linear-gradient(135deg, #17633a, #0f3d2e);
    color: #fff;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
}
.checkout-summary span {
    font-weight: 800;
    letter-spacing: .08em;
    text-transform: uppercase;
    font-size: .78rem;
}
.checkout-summary h1 {
    font-weight: 850;
    margin: .5rem 0;
}
.checkout-summary p {
    color: rgba(255,255,255,.78);
}
.total-box {
    margin-top: auto;
    padding: 1rem;
    border-radius: 8px;
    background: rgba(255,255,255,.12);
}
.total-box small,
.total-box strong {
    display: block;
}
.total-box strong {
    font-size: 1.7rem;
}
.checkout-form {
    padding: 1.5rem;
}
.styled-form p {
    margin-bottom: 1rem;
}
.styled-form label {
    display: block;
    font-weight: 700;
    margin-bottom: .35rem;
}
.styled-form input,
.styled-form select,
.styled-form textarea {
    width: 100%;
    border: 1px solid #d7e3da;
    border-radius: 8px;
    padding: .7rem .85rem;
    background: #fff;
    transition: border-color .2s ease, box-shadow .2s ease;
}
.styled-form input:focus,
.styled-form select:focus,
.styled-form textarea:focus {
    border-color: #198754;
    box-shadow: 0 0 0 .2rem rgba(25, 135, 84, .12);
    outline: none;
}
.styled-form textarea {
    min-height: 110px;
}
.styled-form .errorlist {
    color: #b42318;
    margin-bottom: .4rem;
    padding-left: 1.1rem;
    font-size: .92rem;
}
.styled-form .btn {
    min-width: 150px;
}
@media (max-width: 767.98px) {
    .checkout-card {
        grid-template-columns: 1fr;
    }
    .styled-form .btn {
        width: 100%;
    }
}
</style>
{% endblock %}
